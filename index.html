<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schema Therapy Journal & Evaluator</title>
    <!-- Tailwind CSS for modern UI -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;

        .animate-in { animation: fadeIn 0.4s ease-out forwards; }

        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 6px; }

        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="text-slate-900 selection:bg-indigo-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SCHEMAS = [
            "Abandonment", "Mistrust/Abuse", "Emotional Deprivation", "Defectiveness", "Social Isolation",
            "Dependence", "Vulnerability to Harm", "Enmeshment", "Failure", "Entitlement", 
            "Insufficient Self-Control", "Subjugation", "Self-Sacrifice", "Approval-Seeking",
            "Negativity/Pessimism", "Emotional Inhibition", "Unrelenting Standards", "Punitiveness"
        ];

        const STORAGE_KEY = "schema_journal_v10_final";
        const USER_API_KEY = "AIzaSyDmjb0u_rfr08MyuHc3f4ByEluR-R7_TKc";

        // Icon Component wrapper for Lucide
        const Icon = ({ name, size = 20, className = "" }) => {
            const [svg, setSvg] = React.useState("");
            React.useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        setSvg(icon.toSvg({ size, class: className }));
                    }
                }
            }, [name, size, className]);
            return <span dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const App = () => {
            const [entries, setEntries] = useState([]);
            const [activeTab, setActiveTab] = useState('new');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            
            const [trigger, setTrigger] = useState("");
            const [emotions, setEmotions] = useState("");
            const [thoughts, setThoughts] = useState("");
            const [analysis, setAnalysis] = useState(null);

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        setEntries(JSON.parse(saved));
                    } catch (e) {
                        console.error("Failed to load entries", e);
                    }
                }
            }, []);

            const saveEntry = (data) => {
                const newEntry = {
                    id: Date.now(),
                    date: new Date().toISOString(),
                    ...data
                };
                const updated = [newEntry, ...entries];
                setEntries(updated);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
            };

            const deleteEntry = (id) => {
                if (confirm("Delete this entry?")) {
                    const updated = entries.filter(e => e.id !== id);
                    setEntries(updated);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
                }
            };

            const runAnalysis = async () => {
                if (!trigger || !thoughts) {
                    setError("Please fill out the trigger and your thoughts to begin.");
                    return;
                }

                setLoading(true);
                setError(null);

                const systemPrompt = `You are a world-class Schema Therapist. 
                Analyze the journal entry based on Jeffrey Young's Schema Therapy.
                Identify: EMS, Schema Mode, Coping Style, Healthy Adult Reframing, and Nurtured Child Message.
                Return ONLY a valid JSON object:
                {
                    "schemas": ["Name"],
                    "mode": "Mode Name",
                    "coping": "Style Name",
                    "rationalReframing": "Challenge the distortion...",
                    "healthyAdultPerspective": "Actionable adult wisdom...",
                    "nurturedChildPerspective": "Comforting words for the child..."
                }`;

                const userQuery = `Trigger: ${trigger}\nEmotions: ${emotions}\nThoughts: ${thoughts}`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${USER_API_KEY}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) throw new Error("Connection Error. Ensure you have an active internet connection.");
                    
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    const parsed = JSON.parse(text);
                    setAnalysis(parsed);
                    saveEntry({ trigger, emotions, thoughts, analysis: parsed });
                } catch (err) {
                    setError("Evaluation failed. Browser security often blocks AI requests from local files. Try running this file through a local server or the Preview tab.");
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 font-sans p-4 md:p-8">
                    <div className="max-w-3xl mx-auto">
                        <header className="mb-10 text-center">
                            <div className="flex items-center justify-center gap-3 mb-2">
                                <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-xl shadow-indigo-100">
                                    <Icon name="Brain" size={32} />
                                </div>
                                <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">Schema Journal</h1>
                            </div>
                            <p className="text-slate-500 font-medium italic">Empowering the Healthy Adult through Awareness.</p>
                        </header>

                        <div className="flex bg-white p-1.5 rounded-2xl shadow-sm mb-8 border border-slate-200">
                            <button 
                                onClick={() => setActiveTab('new')}
                                className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl font-bold transition-all ${activeTab === 'new' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50'}`}
                            >
                                <Icon name="Plus" size={18} /> New Entry
                            </button>
                            <button 
                                onClick={() => setActiveTab('history')}
                                className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl font-bold transition-all ${activeTab === 'history' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50'}`}
                            >
                                <Icon name="History" size={18} /> Archive
                            </button>
                        </div>

                        {activeTab === 'new' ? (
                            <div className="space-y-6">
                                <section className="bg-white rounded-[2rem] shadow-sm border border-slate-200 p-8">
                                    <div className="flex items-center gap-2 mb-6 text-indigo-600">
                                        <Icon name="Sparkles" size={20} />
                                        <h2 className="text-xl font-bold">1. Phase of Awareness</h2>
                                    </div>
                                    
                                    <div className="space-y-6">
                                        <div>
                                            <label className="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest ml-1">Trigger Event</label>
                                            <textarea 
                                                value={trigger}
                                                onChange={(e) => setTrigger(e.target.value)}
                                                placeholder="What happened?..."
                                                className="w-full bg-slate-50 border-0 rounded-2xl p-5 focus:ring-4 focus:ring-indigo-100 transition-all h-24 resize-none outline-none"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest ml-1">Automatic Thoughts</label>
                                            <textarea 
                                                value={thoughts}
                                                onChange={(e) => setThoughts(e.target.value)}
                                                placeholder="What is your mind saying?..."
                                                className="w-full bg-slate-50 border-0 rounded-2xl p-5 focus:ring-4 focus:ring-indigo-100 transition-all h-28 resize-none outline-none"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black uppercase text-slate-400 mb-2 tracking-widest ml-1">Emotions</label>
                                            <input 
                                                value={emotions}
                                                onChange={(e) => setEmotions(e.target.value)}
                                                placeholder="Anxiety, shame, unworthiness..."
                                                className="w-full bg-slate-50 border-0 rounded-2xl p-5 focus:ring-4 focus:ring-indigo-100 transition-all outline-none"
                                            />
                                        </div>
                                    </div>

                                    <div className="mt-8">
                                        <button 
                                            onClick={runAnalysis}
                                            disabled={loading}
                                            className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-3xl shadow-xl shadow-indigo-100 flex items-center justify-center gap-3 transition-all active:scale-95 disabled:opacity-50"
                                        >
                                            {loading ? (
                                                <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                                            ) : <Icon name="ShieldCheck" size={20} />}
                                            {loading ? "Analyzing..." : "Evaluate Pattern"}
                                        </button>
                                    </div>
                                    {error && (
                                        <div className="mt-4 p-4 bg-rose-50 text-rose-600 rounded-2xl flex items-center gap-2 border border-rose-100">
                                            <Icon name="AlertCircle" size={18} />
                                            <span className="text-sm font-bold leading-tight">{error}</span>
                                        </div>
                                    )}
                                </section>

                                {analysis && (
                                    <section className="bg-slate-900 text-white rounded-[2.5rem] p-10 shadow-2xl space-y-10 animate-in">
                                        <div className="flex items-center gap-3">
                                            <div className="bg-indigo-500/20 p-2 rounded-xl text-indigo-400">
                                                <Icon name="CheckCircle2" size={24} />
                                            </div>
                                            <div>
                                                <h2 className="text-xl font-bold text-white">Healing Perspective</h2>
                                                <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Applying Schema Therapy Insights</p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="bg-white/5 border border-white/10 rounded-3xl p-6">
                                                <h3 className="text-[10px] font-black uppercase text-indigo-400 mb-3 tracking-widest">Schemas Identified</h3>
                                                <div className="flex flex-wrap gap-2">
                                                    {analysis.schemas.map(s => (
                                                        <span key={s} className="bg-indigo-500/20 text-indigo-200 px-3 py-1 rounded-xl text-xs font-bold border border-indigo-500/30">{s}</span>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="bg-white/5 border border-white/10 rounded-3xl p-6">
                                                <h3 className="text-[10px] font-black uppercase text-amber-400 mb-3 tracking-widest">Mode & Style</h3>
                                                <p className="text-lg font-bold leading-none mb-1 text-white">{analysis.mode}</p>
                                                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">{analysis.coping}</p>
                                            </div>
                                        </div>

                                        <div className="space-y-10">
                                            <div className="relative pl-6 border-l-4 border-indigo-500/30">
                                                <h3 className="text-indigo-300 text-[10px] font-black uppercase mb-3 tracking-widest">Rational Challenge</h3>
                                                <p className="italic text-xl leading-relaxed text-slate-200 font-light">"{analysis.rationalReframing}"</p>
                                            </div>
                                            
                                            <div className="bg-white text-slate-900 rounded-[2rem] p-8 shadow-inner">
                                                <h3 className="text-indigo-600 text-[10px] font-black uppercase mb-3 tracking-widest flex items-center gap-2">
                                                    Healthy Adult Perspective
                                                </h3>
                                                <p className="font-semibold leading-relaxed text-lg">{analysis.healthyAdultPerspective}</p>
                                            </div>

                                            <div className="bg-indigo-500/10 p-8 rounded-[2rem] border border-indigo-500/20">
                                                <h3 className="text-indigo-300 text-[10px] font-black uppercase mb-3 tracking-widest flex items-center gap-2">
                                                    <Icon name="Heart" size={16} /> Comforting the Inner Child
                                                </h3>
                                                <p className="text-md italic text-indigo-100 leading-relaxed">"{analysis.nurturedChildPerspective}"</p>
                                            </div>
                                        </div>
                                    </section>
                                )}
                            </div>
                        ) : (
                            <div className="space-y-4 animate-in">
                                {entries.length === 0 ? (
                                    <div className="bg-white rounded-[2.5rem] p-20 text-center border border-dashed border-slate-200">
                                        <Icon name="History" size={48} className="mx-auto text-slate-200 mb-4 opacity-30" />
                                        <p className="text-slate-400 font-bold uppercase text-[10px] tracking-widest">No entries yet</p>
                                    </div>
                                ) : (
                                    entries.map(entry => (
                                        <div key={entry.id} className="bg-white rounded-[2rem] p-8 border border-slate-100 group transition-all hover:shadow-xl hover:shadow-slate-200/40">
                                            <div className="flex justify-between items-start mb-4">
                                                <div className="flex-1 min-w-0 pr-4">
                                                    <p className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-1">
                                                        {new Date(entry.date).toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' })}
                                                    </p>
                                                    <h3 className="font-bold text-slate-800 text-lg leading-tight line-clamp-1">{entry.trigger}</h3>
                                                </div>
                                                <button 
                                                    onClick={() => deleteEntry(entry.id)} 
                                                    className="text-slate-200 hover:text-rose-500 p-2 transition-colors rounded-full hover:bg-rose-50"
                                                >
                                                    <Icon name="Trash2" size={20} />
                                                </button>
                                            </div>
                                            <p className="text-sm text-slate-500 line-clamp-2 italic leading-relaxed">"{entry.analysis.rationalReframing}"</p>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        <footer className="mt-16 text-center py-12">
                            <div className="flex items-center justify-center gap-4 mb-4">
                                <div className="h-px w-12 bg-slate-200" />
                                <p className="text-[9px] font-black text-slate-300 uppercase tracking-[0.4em] flex items-center gap-2 text-center">
                                    Healing • Awareness • Growth
                                </p>
                                <div className="h-px w-12 bg-slate-200" />
                            </div>
                            <p className="text-[8px] text-slate-300 px-12 uppercase leading-relaxed max-w-sm mx-auto">
                                Based on Jeffrey Young's Schema Therapy. For educational self-reflection only.
                            </p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
