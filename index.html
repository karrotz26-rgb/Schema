<body class="text-slate-900 selection:bg-indigo-100">

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Inline SVG Icons

            History: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg>,
            Trash: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,

            Sparkles: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3z"></path></svg>,
            Check: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Shield: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>,
            Alert: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        };

        const STORAGE_KEY = "schema_journal_v13_stable";
        const API_KEY = "AIzaSyDmjb0u_rfr08MyuHc3f4ByEluR-R7_TKc";
        
        // standard model identifier for Gemini API
        const MODEL_NAME = "gemini-1.5-flash";

        const App = () => {
            const [entries, setEntries] = useState([]);
            const [activeTab, setActiveTab] = useState('new');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            
            const [trigger, setTrigger] = useState("");
            const [emotions, setEmotions] = useState("");
            const [thoughts, setThoughts] = useState("");
            const [analysis, setAnalysis] = useState(null);

            useEffect(() => {
                const loader = document.getElementById('app-loading');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }

                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed)) setEntries(parsed);
                    } catch (e) {
                        localStorage.removeItem(STORAGE_KEY);
                    }
                }
            }, []);

            const saveEntry = (data) => {
                const newEntry = {
                    id: Date.now(),
                    date: new Date().toISOString(),
                    ...data
                };
                const updated = [newEntry, ...entries];
                setEntries(updated);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
            };

            const deleteEntry = (id) => {
                if (confirm("Permanently delete this entry?")) {
                    const updated = entries.filter(e => e.id !== id);
                    setEntries(updated);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
                }
            };

            const runAnalysis = async () => {
                if (!trigger || !thoughts) {
                    setError("Please describe the trigger and your thoughts.");
                    return;
                }

                setLoading(true);
                setError(null);

                const systemPrompt = `You are a world-renowned Schema Therapist expert. Analyze the input based on Jeffrey Young's model.
                Identify Early Maladaptive Schemas, Mode, Coping Style, Healthy Adult Reframe, and Nurtured Child Message.
                Return ONLY valid JSON:
                {
                    "schemas": ["Name"],
                    "mode": "Mode Name",
                    "coping": "Strategy Name",
                    "rationalReframing": "Compassionate logical challenge",
                    "healthyAdultPerspective": "Instruction for adult behavior",
                    "nurturedChildPerspective": "Comforting message for the child"
                }`;

                const userQuery = `TRIGGER: ${trigger}\nTHOUGHTS: ${thoughts}\nEMOTIONS: ${emotions}`;

                // Exponential backoff logic
                const delays = [1000, 2000, 4000, 8000, 16000];
                let lastError = "";

                for (let i = 0; i <= delays.length; i++) {
                    try {
                        // Using the v1beta endpoint with standard model name
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userQuery }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { 
                                    responseMimeType: "application/json",
                                    temperature: 0.7
                                }
                            })
                        });

                        if (!response.ok) {
                            const errBody = await response.json().catch(() => ({}));
                            throw new Error(errBody.error?.message || `HTTP ${response.status}`);
                        }
                        
                        const result = await response.json();
                        const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (!text) throw new Error("Empty response from model");
                        
                        const parsed = JSON.parse(text);
                        
                        setAnalysis(parsed);
                        saveEntry({ trigger, emotions, thoughts, analysis: parsed });
                        setLoading(false);
                        return;
                    } catch (err) {
                        lastError = err.message;
                        if (i < delays.length) {
                            await new Promise(r => setTimeout(r, delays[i]));
                        }
                    }
                }

                setError(`Analysis failed: ${lastError}. Try refreshing or checking your API key.`);
                setLoading(false);
            };

            return (
                <div className="min-h-screen max-w-2xl mx-auto px-4 py-8 md:py-16">
                    <header className="flex items-center justify-between mb-10">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-xl shadow-indigo-200">
                                <Icons.Brain />
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold text-slate-800 tracking-tight leading-none mb-1">Schema Journal</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Thought Evaluator</p>
                            </div>
                        </div>
                    </header>

                    <nav className="flex gap-2 bg-slate-200/50 p-1.5 rounded-2xl mb-10">
                        <button 
                            onClick={() => setActiveTab('new')} 
                            className={`flex-1 flex items-center justify-center gap-2 py-3.5 rounded-xl font-bold transition-all ${activeTab === 'new' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-700'}`}
                        >
                            <Icons.Plus /> New Entry
                        </button>
                        <button 
                            onClick={() => setActiveTab('history')} 
                            className={`flex-1 flex items-center justify-center gap-2 py-3.5 rounded-xl font-bold transition-all ${activeTab === 'history' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-700'}`}
                        >
                            <Icons.History /> Archive
                        </button>
                    </nav>

                    {activeTab === 'new' ? (
                        <div className="space-y-6 animate-fade-in">
                            <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200">
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-1">The Trigger / Situation</label>
                                        <textarea 
                                            value={trigger} 
                                            onChange={e => setTrigger(e.target.value)} 
                                            className="w-full bg-slate-50 border-0 rounded-3xl p-5 h-28 focus:ring-4 focus:ring-indigo-100 transition-all resize-none placeholder:text-slate-300 outline-none" 
                                            placeholder="What happened just now?" 
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-1">Automatic Thoughts</label>
                                        <textarea 
                                            value={thoughts} 
                                            onChange={e => setThoughts(e.target.value)} 
                                            className="w-full bg-slate-50 border-0 rounded-3xl p-5 h-32 focus:ring-4 focus:ring-indigo-100 transition-all resize-none placeholder:text-slate-300 outline-none" 
                                            placeholder="What is your mind saying to you?" 
                                        />
                                    </div>
                                    <button 
                                        onClick={runAnalysis} 
                                        disabled={loading} 
                                        className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-3xl disabled:opacity-50 shadow-xl shadow-indigo-100 flex justify-center items-center gap-3 transition-all active:scale-[0.98]"
                                    >
                                        {loading ? (
                                            <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                        ) : <Icons.Sparkles />}
                                        {loading ? "Analyzing..." : "Evaluate Pattern"}
                                    </button>
                                    {error && (
                                        <div className="mt-4 p-4 bg-rose-50 text-rose-600 rounded-2xl text-sm border border-rose-100 flex items-start gap-2">
                                            <Icons.Alert />
                                            <span>{error}</span>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {analysis && (
                                <div className="bg-slate-900 text-white rounded-[2.5rem] p-10 shadow-2xl animate-fade-in space-y-10">
                                    <div className="flex items-center justify-between border-b border-white/10 pb-6">
                                        <h2 className="text-xl font-bold">Healing Analysis</h2>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-white/5 border border-white/10 rounded-3xl p-6">
                                            <label className="text-[10px] font-black uppercase text-indigo-400 mb-3 block tracking-widest">EMS (Schemas)</label>
                                            <div className="flex flex-wrap gap-2">
                                                {analysis.schemas.map(s => <span key={s} className="bg-indigo-500/20 text-indigo-200 px-3 py-1 rounded-xl text-xs font-bold border border-indigo-500/30">{s}</span>)}
                                            </div>
                                        </div>
                                        <div className="bg-white/5 border border-white/10 rounded-3xl p-6">
                                            <label className="text-[10px] font-black uppercase text-amber-400 mb-3 block tracking-widest">Active Mode</label>
                                            <p className="text-lg font-bold leading-none mb-1">{analysis.mode}</p>
                                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">{analysis.coping}</p>
                                        </div>
                                    </div>

                                    <div className="space-y-10">
                                        <div className="border-l-4 border-indigo-500/30 pl-6">
                                            <h3 className="text-indigo-300 text-[10px] font-black uppercase mb-3 tracking-widest">Rational Reframing</h3>
                                            <p className="italic text-xl leading-relaxed text-slate-200 font-light">"{analysis.rationalReframing}"</p>
                                        </div>
                                        <div className="bg-white text-slate-900 rounded-[2rem] p-8 shadow-inner border border-white/10">
                                            <h3 className="text-indigo-600 text-[10px] font-black uppercase mb-3 flex items-center gap-2 font-bold tracking-widest">
                                                <Icons.Shield /> Healthy Adult Perspective
                                            </h3>
                                            <p className="font-semibold leading-relaxed text-lg">{analysis.healthyAdultPerspective}</p>
                                        </div>
                                        <div className="bg-indigo-500/10 p-8 rounded-[2rem] border border-indigo-500/20">
                                            <h3 className="text-indigo-300 text-[10px] font-black uppercase mb-3 flex items-center gap-2 tracking-widest">
                                                <Icons.Heart /> Reparenting Message
                                            </h3>
                                            <p className="text-md italic text-indigo-100 leading-relaxed">"{analysis.nurturedChildPerspective}"</p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="space-y-4 animate-fade-in">
                            {entries.length === 0 ? (
                                <div className="bg-white rounded-[2.5rem] p-20 text-center border border-dashed border-slate-200 text-slate-400">
                                    <div className="flex justify-center mb-4 opacity-30"><Icons.History /></div>
                                    <p className="font-bold uppercase text-[10px] tracking-widest">Archive is empty</p>
                                </div>
                            ) : (
                                entries.map(entry => (
                                    <div key={entry.id} className="bg-white rounded-[2rem] p-8 border border-slate-200 flex justify-between items-start hover:shadow-md transition-all group">
                                        <div>
                                            <p className="text-[10px] font-bold text-indigo-400 uppercase mb-1">{new Date(entry.date).toLocaleDateString()}</p>
                                            <h3 className="font-bold text-slate-800 line-clamp-1">{entry.trigger}</h3>
                                            <p className="text-xs text-slate-400 mt-1 italic">"{entry.analysis.rationalReframing.substring(0, 80)}..."</p>
                                        </div>
                                        <button onClick={() => deleteEntry(entry.id)} className="text-slate-300 hover:text-rose-500 transition-colors p-2"><Icons.Trash /></button>
                                    </div>
                                ))
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
