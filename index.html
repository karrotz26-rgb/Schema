<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schema Therapy Journal & Evaluator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            margin: 0; padding: 0; overflow-x: hidden;

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #app-loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: #ffffff; z-index: 9999; transition: opacity 0.5s ease;
        }
        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%;
            width: 35px; height: 35px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-900 selection:bg-indigo-100">
    <div id="app-loading">
        <div class="loader"></div>
        <p style="margin-top: 15px; color: #6366f1; font-size: 14px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;">Activating Schema Journal</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const STORAGE_KEY = "schema_journal_v2.5_final";
        const SETTINGS_KEY = "schema_journal_settings_v2.5";
        
        const DEFAULTS = {
            apiKey: "AIzaSyDmjb0u_rfr08MyuHc3f4ByEluR-R7_TKc",
            modelId: "gemini-2.5-flash", 
            apiVersion: "v1beta"
        };

        const Icons = {
            Brain: () => <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2a.5.5 0 0 1 .5.5v1.1a1 1 0 0 1-.5.9 1.5 1.5 0 0 0 0 3 1 1 0 0 1 .5.9v1.1a.5.5 0 0 1-.5.5h-1a.5.5 0 0 1-.5-.5v-1.1a1 1 0 0 1 .5-.9 1.5 1.5 0 0 0 0-3 1 1 0 0 1-.5-.9v-1.1a.5.5 0 0 1 .5-.5z"/><path d="M14.5 2a.5.5 0 0 0-.5.5v1.1a1 1 0 0 0 .5.9 1.5 1.5 0 0 1 0 3 1 1 0 0 0-.5.9v1.1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1.1a1 1 0 0 0-.5-.9 1.5 1.5 0 0 1 0-3 1 1 0 0 0 .5-.9v-1.1a.5.5 0 0 0-.5-.5z"/><path d="M12 2v20"/><path d="M2 12h20"/></svg>,
            Plus: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            History: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>,
            Trash: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Settings: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
            Sparkles: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 3l1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3z"></path></svg>,
            Shield: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>,
            Heart: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>,
            Alert: () => <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        };

        const App = () => {
            const [entries, setEntries] = useState([]);
            const [activeTab, setActiveTab] = useState('new');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            
            const [apiKey, setApiKey] = useState(DEFAULTS.apiKey);
            const [modelId, setModelId] = useState(DEFAULTS.modelId);
            const [apiVersion, setApiVersion] = useState(DEFAULTS.apiVersion);

            const [trigger, setTrigger] = useState("");
            const [thoughts, setThoughts] = useState("");
            const [emotions, setEmotions] = useState("");
            const [analysis, setAnalysis] = useState(null);

            useEffect(() => {
                const loader = document.getElementById('app-loading');
                if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 500); }

                const savedJournal = localStorage.getItem(STORAGE_KEY);
                if (savedJournal) { try { setEntries(JSON.parse(savedJournal)); } catch (e) {} }

                const savedSettings = localStorage.getItem(SETTINGS_KEY);
                if (savedSettings) {
                    try {
                        const s = JSON.parse(savedSettings);
                        setApiKey(s.apiKey || DEFAULTS.apiKey);
                        setModelId(s.modelId || DEFAULTS.modelId);
                        setApiVersion(s.apiVersion || DEFAULTS.apiVersion);
                    } catch (e) {}
                }
            }, []);

            const saveSettings = (key, val) => {
                const newSettings = { apiKey, modelId, apiVersion, [key]: val };
                localStorage.setItem(SETTINGS_KEY, JSON.stringify(newSettings));
                if (key === 'apiKey') setApiKey(val);
                if (key === 'modelId') setModelId(val);
                if (key === 'apiVersion') setApiVersion(val);
            };

            const runAnalysis = async () => {
                if (!trigger || !thoughts) { setError("Both Situation and Thoughts are required."); return; }
                setLoading(true);
                setError(null);

                const systemPrompt = `You are a world-class expert in Schema Therapy by Jeffrey Young. 
                Analyze the input and identify: 
                1. 1-3 Early Maladaptive Schemas (EMS).
                2. The active Schema Mode (e.g., Vulnerable Child, Angry Child, Punitive Parent).
                3. The Coping Style (Surrender, Avoidance, or Overcompensation).
                4. A 'Healthy Adult' rational reframing to challenge distortions.
                5. A 'Healthy Adult' practical path forward.
                6. A 'Nurtured Child' message: compassionate validation for the inner child.
                
                You MUST return ONLY a valid JSON object:
                {
                    "schemas": ["Name"],
                    "mode": "Mode Name",
                    "coping": "Style Name",
                    "rationalReframing": "Challenge thoughts here...",
                    "healthyAdultPerspective": "Instruction for adult self...",
                    "nurturedChildPerspective": "Message for the child..."
                }`;

                const userQuery = `TRIGGER: ${trigger}\nTHOUGHTS: ${thoughts}\nEMOTIONS: ${emotions}`;

                try {
                    const url = `https://generativelanguage.googleapis.com/${apiVersion}/models/${modelId}:generateContent?key=${apiKey}`;
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json", temperature: 0.7 }
                        })
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || `HTTP ${response.status}`);
                    }
                    
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    const parsed = JSON.parse(text);
                    
                    setAnalysis(parsed);
                    const newEntry = { id: Date.now(), date: new Date().toISOString(), trigger, emotions, thoughts, analysis: parsed };
                    const updated = [newEntry, ...entries];
                    setEntries(updated);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
                } catch (err) {
                    setError(`Analysis Error: ${err.message}. If the model is not found, check the Model ID in settings.`);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen max-w-2xl mx-auto px-4 py-8 md:py-16">
                    <header className="flex items-center justify-between mb-10">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-xl shadow-indigo-100">
                                <Icons.Brain />
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold text-slate-800 tracking-tight">Schema Journal</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Gemini 2.5 Flash Powered</p>
                            </div>
                        </div>
                        <button onClick={() => setShowSettings(!showSettings)} className="text-slate-400 hover:text-indigo-600 transition-colors">
                            <Icons.Settings />
                        </button>
                    </header>

                    {showSettings && (
                        <div className="mb-8 bg-slate-100 p-6 rounded-[2rem] border border-slate-200 animate-fade-in space-y-4">
                            <h3 className="font-bold text-slate-700 text-xs uppercase tracking-widest">System Configuration</h3>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 block mb-1 uppercase">API Version</label>
                                    <input value={apiVersion} onChange={e => saveSettings('apiVersion', e.target.value)} className="w-full bg-white border border-slate-200 rounded-xl p-2 text-xs outline-none" />
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-slate-400 block mb-1 uppercase">Model ID</label>
                                    <input value={modelId} onChange={e => saveSettings('modelId', e.target.value)} className="w-full bg-white border border-slate-200 rounded-xl p-2 text-xs outline-none" />
                                </div>
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-slate-400 block mb-1 uppercase tracking-tighter">Your API Key</label>
                                <input type="password" value={apiKey} onChange={e => saveSettings('apiKey', e.target.value)} className="w-full bg-white border border-slate-200 rounded-xl p-2 text-xs outline-none" />
                            </div>
                            <button onClick={() => setShowSettings(false)} className="w-full bg-slate-800 text-white font-bold py-2 rounded-xl text-[10px] uppercase tracking-widest">Save Settings</button>
                        </div>
                    )}

                    <nav className="flex gap-2 bg-slate-200/50 p-1.5 rounded-2xl mb-10">
                        <button onClick={() => setActiveTab('new')} className={`flex-1 flex items-center justify-center gap-2 py-3.5 rounded-xl font-bold transition-all ${activeTab === 'new' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}><Icons.Plus /> New Diary</button>
                        <button onClick={() => setActiveTab('history')} className={`flex-1 flex items-center justify-center gap-2 py-3.5 rounded-xl font-bold transition-all ${activeTab === 'history' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'}`}><Icons.History /> Archive</button>
                    </nav>

                    {activeTab === 'new' ? (
                        <div className="space-y-6 animate-fade-in">
                            <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200">
                                <div className="space-y-6">
                                    <textarea value={trigger} onChange={e => setTrigger(e.target.value)} className="w-full bg-slate-50 border-0 rounded-3xl p-5 h-28 outline-none focus:ring-4 focus:ring-indigo-100 transition-all placeholder:text-slate-300" placeholder="The Situation (Trigger Event)..." />
                                    <textarea value={thoughts} onChange={e => setThoughts(e.target.value)} className="w-full bg-slate-50 border-0 rounded-3xl p-5 h-32 outline-none focus:ring-4 focus:ring-indigo-100 transition-all placeholder:text-slate-300" placeholder="Automatic Thoughts & Internal Dialogue..." />
                                    <button onClick={runAnalysis} disabled={loading} className="w-full bg-indigo-600 text-white font-bold py-5 rounded-3xl shadow-xl shadow-indigo-100 flex justify-center items-center gap-3 transition-transform active:scale-95">
                                        {loading ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : <Icons.Sparkles />}
                                        {loading ? "Analyzing..." : "Evaluate Pattern"}
                                    </button>
                                    {error && <div className="mt-4 p-4 bg-rose-50 text-rose-600 rounded-2xl text-[10px] font-bold flex gap-2"><Icons.Alert /> {error}</div>}
                                </div>
                            </div>

                            {analysis && (
                                <div className="bg-slate-900 text-white rounded-[2.5rem] p-10 shadow-2xl animate-fade-in space-y-10 overflow-hidden relative">
                                    <div className="absolute top-0 right-0 p-8 opacity-5">
                                        <Icons.Brain />
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-white/5 border border-white/10 rounded-3xl p-6">
                                            <label className="text-[10px] font-black text-indigo-400 block uppercase mb-1 tracking-widest">Activated EMS</label>
                                            <div className="flex flex-wrap gap-2">{analysis.schemas.map(s => <span key={s} className="bg-indigo-500/20 text-indigo-200 px-3 py-1 rounded-xl text-[9px] font-bold border border-indigo-500/30 uppercase">{s}</span>)}</div>
                                        </div>
                                        <div className="bg-white/5 border border-white/10 rounded-3xl p-6">
                                            <label className="text-[10px] font-black text-amber-400 block uppercase mb-1 tracking-widest">Mode & Coping Style</label>
                                            <p className="font-bold text-sm text-white">{analysis.mode}</p>
                                            <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">{analysis.coping}</p>
                                        </div>
                                    </div>
                                    <div className="space-y-10">
                                        <div className="border-l-4 border-indigo-500/30 pl-6">
                                            <h3 className="text-indigo-300 text-[10px] font-black uppercase mb-3 tracking-widest">Rational Re-evaluation</h3>
                                            <p className="italic text-xl text-slate-200 font-light leading-relaxed">"{analysis.rationalReframing}"</p>
                                        </div>
                                        
                                        <div className="bg-white text-slate-900 rounded-[2rem] p-8 shadow-inner border border-white/10">
                                            <h3 className="text-indigo-600 text-[10px] font-black uppercase mb-3 flex items-center gap-2 font-bold tracking-widest">
                                                <Icons.Shield /> Healthy Adult Perspective
                                            </h3>
                                            <p className="font-semibold leading-relaxed text-lg">{analysis.healthyAdultPerspective}</p>
                                        </div>

                                        <div className="bg-indigo-500/10 p-8 rounded-[2rem] border border-indigo-500/20">
                                            <h3 className="text-indigo-300 text-[10px] font-black uppercase mb-3 flex items-center gap-2 tracking-widest font-bold">
                                                <Icons.Heart /> Message to Inner Child
                                            </h3>
                                            <p className="text-md italic text-indigo-100 leading-relaxed font-medium">"{analysis.nurturedChildPerspective}"</p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="space-y-4 animate-fade-in">
                            {entries.length === 0 ? <div className="py-20 text-center opacity-20 flex justify-center"><Icons.History /></div> :
                                entries.map(entry => (
                                    <div key={entry.id} className="bg-white rounded-[2rem] p-8 border border-slate-200 flex justify-between items-start transition-all hover:shadow-md group">
                                        <div className="flex-1">
                                            <p className="text-[10px] font-bold text-indigo-400 uppercase mb-1 tracking-widest leading-none">{new Date(entry.date).toLocaleDateString(undefined, {dateStyle: 'full'})}</p>
                                            <h3 className="font-bold text-slate-800 line-clamp-1 text-lg mb-2">{entry.trigger}</h3>
                                            <p className="text-xs text-slate-500 italic line-clamp-2 leading-relaxed">"{entry.analysis.rationalReframing}"</p>
                                        </div>
                                        <button onClick={() => {
                                            if (confirm("Permanently delete?")) {
                                                const updated = entries.filter(e => e.id !== entry.id);
                                                setEntries(updated);
                                                localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
                                            }
                                        }} className="text-slate-300 hover:text-rose-500 transition-colors p-2"><Icons.Trash /></button>
                                    </div>
                                ))
                            }
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
